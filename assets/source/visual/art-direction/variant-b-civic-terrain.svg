<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Variant B — civic terrain board</title>
  <desc id="desc">A flat-vector regional board using district blocks, roads, and terrain bands around labeled institutions and a visible report card.</desc>
  <rect width="960" height="600" fill="#eef1e9"/>
  <path d="M0 160 C180 110 280 220 460 150 S800 90 960 155 V310 C760 350 610 250 430 340 S160 290 0 360Z" fill="#d4e0c5"/>
  <path d="M0 420 C180 350 320 470 490 385 S770 400 960 330 V600 H0Z" fill="#dbe7d4"/>
  <path d="M80 540 L310 65 M270 600 L520 0 M560 600 L840 0" stroke="#c5b98f" stroke-width="25" opacity=".75"/>
  <path d="M0 260 C200 200 350 360 520 260 S800 200 960 280" fill="none" stroke="#ffffff" stroke-width="12" opacity=".85"/>
  <rect x="34" y="30" width="892" height="58" rx="8" fill="#496451"/>
  <text x="60" y="67" fill="#ffffff" font-family="system-ui, sans-serif" font-size="24" font-weight="700">CIVIC REGIONAL LANDSCAPE</text>
  <g role="group" aria-label="Riverside institution on district tile">
    <rect x="122" y="205" width="182" height="110" rx="6" fill="#ffffff" stroke="#496451" stroke-width="4"/>
    <text x="143" y="247" fill="#203129" font-family="system-ui, sans-serif" font-size="21" font-weight="700">Riverside</text>
    <text x="143" y="276" fill="#596c5e" font-family="system-ui, sans-serif" font-size="15">DISTRICT CENTER</text>
    <path d="M276 230 l12 21 h-24 z" fill="#b26737"/>
  </g>
  <g role="group" aria-label="Northlake public rival on road">
    <rect x="444" y="142" width="170" height="100" rx="6" fill="#ffffff" stroke="#55768a" stroke-width="4"/>
    <text x="463" y="182" fill="#203129" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Northlake</text>
    <text x="463" y="211" fill="#596c5e" font-family="system-ui, sans-serif" font-size="15">PUBLIC SIGNAL</text>
    <circle cx="585" cy="174" r="11" fill="#55768a"/>
  </g>
  <g role="group" aria-label="Summit public rival on district tile">
    <rect x="670" y="290" width="170" height="100" rx="6" fill="#ffffff" stroke="#725e88" stroke-width="4"/>
    <text x="689" y="330" fill="#203129" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Summit</text>
    <text x="689" y="359" fill="#596c5e" font-family="system-ui, sans-serif" font-size="15">PUBLIC SIGNAL</text>
    <path d="M811 319 l11 11 l-11 11 l-11-11 z" fill="#725e88"/>
  </g>
  <rect x="38" y="462" width="494" height="100" rx="8" fill="#ffffff" stroke="#b26737" stroke-width="4"/>
  <text x="62" y="499" fill="#203129" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Visible facility condition: staffing constrained</text>
  <text x="62" y="529" fill="#596c5e" font-family="system-ui, sans-serif" font-size="15">Roads and districts are stylistic reference only, not true geography.</text>
  <rect x="574" y="462" width="348" height="100" rx="8" fill="#ffffff" stroke="#c7d3c6" stroke-width="3"/>
  <text x="600" y="500" fill="#496451" font-family="system-ui, sans-serif" font-size="18" font-weight="700">B · CIVIC TERRAIN</text>
  <text x="600" y="530" fill="#596c5e" font-family="system-ui, sans-serif" font-size="15">Map-like, but too geography-forward.</text>
</svg>
