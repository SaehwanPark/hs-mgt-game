<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Riverside fictional health-system identity kit</title>
  <desc id="desc">Source vector sheet for a fictional Riverside system: logo mark, monochrome mark, compact marker, facility sign, report header, compact badge, and RV text monogram.</desc>
  <style>
    :root { --riverside-primary: #0b6e69; --riverside-secondary: #a95226; --riverside-ink: #17232d; --riverside-paper: #f4f7f6; }
    .ink { fill: var(--riverside-ink); font-family: system-ui, sans-serif; }
    .small { font-size: 13px; letter-spacing: .04em; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
  </style>
  <defs>
    <symbol id="riverside-mark" viewBox="0 0 96 96">
      <path d="M12 18h22c20 0 31 8 31 23 0 10-5 17-14 21l19 16H49L32 66v12H12zM32 34v17h3c7 0 11-3 11-9s-4-8-11-8z" fill="var(--riverside-primary)"/>
      <path d="M11 84c16-9 32-9 48 0 10 6 18 6 26 0" fill="none" stroke="var(--riverside-secondary)" stroke-linecap="round" stroke-width="7"/>
    </symbol>
    <symbol id="riverside-mark-mono" viewBox="0 0 96 96">
      <path d="M12 18h22c20 0 31 8 31 23 0 10-5 17-14 21l19 16H49L32 66v12H12zM32 34v17h3c7 0 11-3 11-9s-4-8-11-8z" fill="currentColor"/>
      <path d="M11 84c16-9 32-9 48 0 10 6 18 6 26 0" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="7"/>
    </symbol>
    <symbol id="riverside-compact" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="21" fill="var(--riverside-primary)"/>
      <path d="M13 11h11c10 0 15 4 15 11 0 5-3 8-7 10l8 7H27l-8-7v7h-6zM19 19v7h2c3 0 5-1 5-4s-2-3-5-3z" fill="#fff"/>
      <path d="M12 37c8-4 16-4 24 0" fill="none" stroke="var(--riverside-secondary)" stroke-linecap="round" stroke-width="3"/>
    </symbol>
  </defs>
  <rect width="720" height="420" fill="var(--riverside-paper)"/>
  <text x="32" y="38" class="ink title">Riverside identity kit · fictional system</text>
  <text x="32" y="61" class="ink small">Stable geometric mark; river line is a shape cue, not a geographic claim.</text>

  <g id="logo-mark" transform="translate(42 92)">
    <use href="#riverside-mark" width="96" height="96"/>
    <text x="116" y="55" class="ink" font-size="34" font-weight="700">Riverside</text>
  </g>
  <text x="42" y="214" class="ink label">Logo mark + wordmark</text>

  <g id="monochrome-mark" transform="translate(300 92)" color="#17232d">
    <use href="#riverside-mark-mono" width="96" height="96"/>
    <text x="116" y="55" class="ink" font-size="34" font-weight="700">Riverside</text>
  </g>
  <text x="300" y="214" class="ink label">Monochrome mark</text>

  <g id="compact-marker" transform="translate(590 98)">
    <use href="#riverside-compact" width="64" height="64"/>
    <text x="-5" y="93" class="ink label">Map marker</text>
  </g>

  <g id="facility-sign" transform="translate(42 250)">
    <rect width="238" height="74" rx="10" fill="#fff" stroke="var(--riverside-primary)" stroke-width="3"/>
    <use href="#riverside-compact" x="12" y="14" width="46" height="46"/>
    <text x="72" y="33" class="ink" font-size="17" font-weight="700">Riverside General</text>
    <text x="72" y="55" class="ink small">FACILITY SIGNAGE</text>
  </g>

  <g id="report-header" transform="translate(300 250)">
    <rect width="238" height="74" rx="10" fill="var(--riverside-primary)"/>
    <use href="#riverside-mark-mono" x="12" y="10" width="54" height="54" color="#fff"/>
    <text x="78" y="34" fill="#fff" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Riverside</text>
    <text x="78" y="55" fill="#d9f1ed" font-family="system-ui, sans-serif" class="small">EXECUTIVE REPORT</text>
  </g>

  <g id="compact-badge" transform="translate(590 250)">
    <rect width="88" height="74" rx="10" fill="#fff" stroke="var(--riverside-secondary)" stroke-width="3"/>
    <text x="44" y="50" text-anchor="middle" class="ink" font-size="30" font-weight="800">RV</text>
  </g>
  <text x="590" y="345" class="ink label">RV monogram</text>
  <text x="42" y="382" class="ink small">Color-independent recognition: R silhouette, river line, compact circle, and RV text remain distinct in monochrome.</text>
</svg>
