<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">Emergency department facility component</title>
  <desc id="desc">Fixture source sheet for a reusable fictional emergency department with identity, capacity, project, pressure, selection, and uncertainty layers.</desc>
  <style>
    :root { --facility-primary: #315a89; --facility-secondary: #c2872f; --facility-ink: #17232d; --facility-paper: #f8fbfd; --facility-muted: #60707b; }
    .ink { fill: var(--facility-ink); font-family: system-ui, sans-serif; }
    .small { font-size: 13px; letter-spacing: .03em; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
  </style>
  <defs>
    <symbol id="emergency-department" viewBox="0 0 180 112">
      <rect x="8" y="52" width="164" height="50" rx="6" fill="var(--facility-primary)"/>
      <rect x="28" y="28" width="68" height="74" rx="5" fill="var(--facility-primary)"/>
      <path d="M40 44h14v16H40zm28 0h14v16H68zm-28 26h14v16H40zm28 0h14v16H68z" fill="var(--facility-paper)" opacity=".9"/>
      <path d="M112 52h50v50h-50zM112 70h50M130 52v50" fill="none" stroke="var(--facility-secondary)" stroke-width="5"/>
      <path d="M62 28V10m-12 9h24" stroke="var(--facility-secondary)" stroke-linecap="round" stroke-width="6"/>
      <rect x="108" y="76" width="22" height="26" fill="var(--facility-paper)"/>
      <path d="M119 81v15M112 88h14" stroke="var(--facility-secondary)" stroke-width="4"/>
    </symbol>
    <symbol id="identity-layer" viewBox="0 0 180 112">
      <rect x="28" y="32" width="34" height="24" rx="4" fill="var(--facility-paper)" stroke="var(--facility-secondary)" stroke-width="3"/>
      <text x="45" y="49" text-anchor="middle" class="ink" font-size="14" font-weight="800">ID</text>
    </symbol>
    <symbol id="capacity-layer" viewBox="0 0 180 112">
      <path d="M10 106h160" stroke="var(--facility-ink)" stroke-width="3"/>
      <path d="M16 106V80h32v26m10 0V58h32v48m10 0V36h32v70m10 0V18h32v88" fill="none" stroke="var(--facility-secondary)" stroke-width="6"/>
    </symbol>
    <symbol id="project-layer" viewBox="0 0 180 112">
      <path d="M18 104h144M30 104V28h8v76m104 0V28h8v76M34 28h104" fill="none" stroke="var(--facility-secondary)" stroke-width="4"/>
      <path d="M72 28 82 8l10 20z" fill="var(--facility-secondary)"/>
    </symbol>
    <symbol id="pressure-layer" viewBox="0 0 180 112">
      <path d="M148 8 174 50h-52z" fill="var(--facility-secondary)"/>
      <path d="M148 20v15m0 7v3" stroke="var(--facility-paper)" stroke-linecap="round" stroke-width="4"/>
    </symbol>
    <symbol id="selection-layer" viewBox="0 0 180 112">
      <rect x="4" y="4" width="172" height="104" rx="10" fill="none" stroke="var(--facility-secondary)" stroke-dasharray="8 5" stroke-width="5"/>
    </symbol>
    <symbol id="uncertainty-layer" viewBox="0 0 180 112">
      <path d="M10 98 170 14M-5 82 145 2M35 112 180 34" stroke="var(--facility-muted)" stroke-dasharray="5 6" stroke-width="10" opacity=".32"/>
    </symbol>
  </defs>

  <rect width="760" height="500" fill="var(--facility-paper)"/>
  <text x="32" y="38" class="ink title">Emergency department · fictional reusable component</text>
  <text x="32" y="61" class="ink small">Shared 8px grid; entrance wing and ED marker identify the facility type, not hidden service performance.</text>

  <g id="emergency-department-base" transform="translate(42 92)">
    <use href="#emergency-department" width="180" height="112"/>
    <use href="#identity-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">ED base + identity layer</text>
  </g>
  <g id="capacity-overlay" transform="translate(270 92)">
    <use href="#emergency-department" width="180" height="112"/>
    <use href="#capacity-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Capacity/service-line layer</text>
  </g>
  <g id="project-overlay" transform="translate(498 92)">
    <use href="#emergency-department" width="180" height="112"/>
    <use href="#project-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Project layer</text>
  </g>

  <g id="pressure-overlay" transform="translate(42 290)">
    <use href="#emergency-department" width="180" height="112"/>
    <use href="#pressure-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Operational-pressure layer</text>
  </g>
  <g id="selection-overlay" transform="translate(270 290)">
    <use href="#emergency-department" width="180" height="112"/>
    <use href="#selection-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Selection/focus layer</text>
  </g>
  <g id="uncertainty-overlay" transform="translate(498 290)">
    <use href="#emergency-department" width="180" height="112"/>
    <use href="#uncertainty-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Uncertainty/stale-observation layer</text>
  </g>

  <text x="42" y="480" class="ink small">Monochrome, small-size, fallback, pressure, and project variants remain text-labeled in the proof.</text>
</svg>
