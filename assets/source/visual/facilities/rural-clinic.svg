<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">Rural clinic facility component</title>
  <desc id="desc">Fixture source sheet for a reusable fictional rural clinic with identity, capacity, project, pressure, selection, and uncertainty layers.</desc>
  <style>
    :root { --facility-primary: #315a89; --facility-secondary: #c2872f; --facility-ink: #17232d; --facility-paper: #f8fbfd; --facility-muted: #60707b; }
    .ink { fill: var(--facility-ink); font-family: system-ui, sans-serif; }
    .small { font-size: 13px; letter-spacing: .03em; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
  </style>
  <defs>
    <symbol id="rural-clinic" viewBox="0 0 180 112"><rect x="16" y="54" width="148" height="48" rx="5" fill="var(--facility-primary)"/><path d="M10 54 90 8l80 46z" fill="var(--facility-primary)"/><path d="M32 68h18v16H32zm30 0h18v16H62zm30 0h18v16H92zm30 0h18v16h-18z" fill="var(--facility-paper)" opacity=".9"/><path d="M90 8v24M78 20h24" stroke="var(--facility-secondary)" stroke-linecap="round" stroke-width="6"/><rect x="80" y="76" width="20" height="26" fill="var(--facility-paper)"/><path d="M90 81v16M83 89h14" stroke="var(--facility-secondary)" stroke-width="4"/></symbol>
    <symbol id="identity-layer" viewBox="0 0 180 112"><rect x="20" y="60" width="34" height="24" rx="4" fill="var(--facility-paper)" stroke="var(--facility-secondary)" stroke-width="3"/><text x="37" y="77" text-anchor="middle" class="ink" font-size="14" font-weight="800">ID</text></symbol>
    <symbol id="capacity-layer" viewBox="0 0 180 112"><path d="M12 106h156M18 106V84h28v22m10 0V64h28v42m10 0V44h28v62m10 0V24h28v82" fill="none" stroke="var(--facility-secondary)" stroke-width="6"/></symbol>
    <symbol id="project-layer" viewBox="0 0 180 112"><path d="M14 104h152M30 104V36h8v68m112 0V36h8v68M34 36h116" fill="none" stroke="var(--facility-secondary)" stroke-width="4"/><path d="M78 36 90 12l12 24z" fill="var(--facility-secondary)"/></symbol>
    <symbol id="pressure-layer" viewBox="0 0 180 112"><path d="M150 8 174 48h-48z" fill="var(--facility-secondary)"/><path d="M150 20v14m0 7v3" stroke="var(--facility-paper)" stroke-linecap="round" stroke-width="4"/></symbol>
    <symbol id="selection-layer" viewBox="0 0 180 112"><rect x="4" y="4" width="172" height="104" rx="10" fill="none" stroke="var(--facility-secondary)" stroke-dasharray="8 5" stroke-width="5"/></symbol>
    <symbol id="uncertainty-layer" viewBox="0 0 180 112"><path d="M10 98 170 14M-5 82 145 2M35 112 180 34" stroke="var(--facility-muted)" stroke-dasharray="5 6" stroke-width="10" opacity=".32"/></symbol>
  </defs>
  <rect width="760" height="500" fill="var(--facility-paper)"/>
  <text x="32" y="38" class="ink title">Rural clinic · fictional reusable component</text>
  <text x="32" y="61" class="ink small">Shared 8px grid; compact pitched roof identifies a facility type, not geographic access or quality.</text>
  <g id="rural-clinic-base" transform="translate(42 92)"><use href="#rural-clinic" width="180" height="112"/><use href="#identity-layer" width="180" height="112"/><text x="0" y="143" class="ink label">Clinic + identity layer</text></g>
  <g id="capacity-overlay" transform="translate(270 92)"><use href="#rural-clinic" width="180" height="112"/><use href="#capacity-layer" width="180" height="112"/><text x="0" y="143" class="ink label">Capacity/service-line layer</text></g>
  <g id="project-overlay" transform="translate(498 92)"><use href="#rural-clinic" width="180" height="112"/><use href="#project-layer" width="180" height="112"/><text x="0" y="143" class="ink label">Project layer</text></g>
  <g id="pressure-overlay" transform="translate(42 290)"><use href="#rural-clinic" width="180" height="112"/><use href="#pressure-layer" width="180" height="112"/><text x="0" y="143" class="ink label">Operational-pressure layer</text></g>
  <g id="selection-overlay" transform="translate(270 290)"><use href="#rural-clinic" width="180" height="112"/><use href="#selection-layer" width="180" height="112"/><text x="0" y="143" class="ink label">Selection/focus layer</text></g>
  <g id="uncertainty-overlay" transform="translate(498 290)"><use href="#rural-clinic" width="180" height="112"/><use href="#uncertainty-layer" width="180" height="112"/><text x="0" y="143" class="ink label">Uncertainty/stale-observation layer</text></g>
  <text x="42" y="480" class="ink small">Monochrome, small-size, fallback, pressure, and project variants remain text-labeled in the proof.</text>
</svg>
