<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">General hospital base facility component</title>
  <desc id="desc">Fixture source sheet for a reusable fictional general hospital base with identity, capacity, project, pressure, selection, and uncertainty layers.</desc>
  <style>
    :root { --facility-primary: #315a89; --facility-secondary: #c2872f; --facility-ink: #17232d; --facility-paper: #f8fbfd; --facility-muted: #60707b; }
    .ink { fill: var(--facility-ink); font-family: system-ui, sans-serif; }
    .small { font-size: 13px; letter-spacing: .03em; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
  </style>
  <defs>
    <symbol id="hospital-base" viewBox="0 0 180 112">
      <rect x="10" y="34" width="160" height="68" rx="6" fill="var(--facility-primary)"/>
      <rect x="28" y="20" width="56" height="82" rx="5" fill="var(--facility-primary)"/>
      <path d="M20 34h140M38 50h12v16H38zm28 0h12v16H66zm28 0h12v16H94zm28 0h12v16h-12z" fill="var(--facility-paper)" opacity=".9"/>
      <path d="M42 20h28M56 8v24M42 20h28" fill="none" stroke="var(--facility-secondary)" stroke-linecap="round" stroke-width="6"/>
      <rect x="84" y="75" width="18" height="27" fill="var(--facility-paper)"/>
      <path d="M93 82v13M87 88h12" stroke="var(--facility-secondary)" stroke-width="4"/>
    </symbol>
    <symbol id="identity-layer" viewBox="0 0 180 112">
      <rect x="12" y="36" width="34" height="26" rx="4" fill="var(--facility-paper)" stroke="var(--facility-secondary)" stroke-width="3"/>
      <text x="29" y="54" text-anchor="middle" class="ink" font-size="15" font-weight="800">ID</text>
    </symbol>
    <symbol id="capacity-layer" viewBox="0 0 180 112">
      <path d="M12 106h156" stroke="var(--facility-ink)" stroke-width="3"/>
      <path d="M12 106v-14h48v14m8 0V76h48v30m8 0V54h48v52" fill="none" stroke="var(--facility-secondary)" stroke-width="6"/>
    </symbol>
    <symbol id="project-layer" viewBox="0 0 180 112">
      <path d="M128 18v80M128 18h38M128 38h28M128 58h18" stroke="var(--facility-secondary)" stroke-width="4"/>
      <path d="m118 98 10-20 10 20z" fill="var(--facility-secondary)"/>
      <path d="M118 98h20" stroke="var(--facility-ink)" stroke-width="3"/>
    </symbol>
    <symbol id="pressure-layer" viewBox="0 0 180 112">
      <path d="M12 10 30 42H-6z" transform="translate(0 0)" fill="var(--facility-secondary)"/>
      <path d="M12 20v10m0 6v2" stroke="var(--facility-paper)" stroke-linecap="round" stroke-width="4"/>
    </symbol>
    <symbol id="selection-layer" viewBox="0 0 180 112">
      <rect x="4" y="4" width="172" height="104" rx="10" fill="none" stroke="var(--facility-secondary)" stroke-dasharray="8 5" stroke-width="5"/>
    </symbol>
    <symbol id="uncertainty-layer" viewBox="0 0 180 112">
      <path d="M10 98 170 14M-5 82 145 2M35 112 180 34" stroke="var(--facility-muted)" stroke-dasharray="5 6" stroke-width="10" opacity=".32"/>
    </symbol>
  </defs>

  <rect width="760" height="500" fill="var(--facility-paper)"/>
  <text x="32" y="38" class="ink title">General hospital base · fictional reusable component</text>
  <text x="32" y="61" class="ink small">Shared 8px grid; layers are visible presentation options, not simulation state.</text>

  <g id="general-hospital-base" transform="translate(42 92)">
    <use href="#hospital-base" width="180" height="112"/>
    <use href="#identity-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Base + identity layer</text>
  </g>
  <g id="capacity-overlay" transform="translate(270 92)">
    <use href="#hospital-base" width="180" height="112"/>
    <use href="#capacity-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Capacity/service-line layer</text>
  </g>
  <g id="project-overlay" transform="translate(498 92)">
    <use href="#hospital-base" width="180" height="112"/>
    <use href="#project-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Project layer</text>
  </g>

  <g id="pressure-overlay" transform="translate(42 290)">
    <use href="#hospital-base" width="180" height="112"/>
    <use href="#pressure-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Operational-pressure layer</text>
  </g>
  <g id="selection-overlay" transform="translate(270 290)">
    <use href="#hospital-base" width="180" height="112"/>
    <use href="#selection-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Selection/focus layer</text>
  </g>
  <g id="uncertainty-overlay" transform="translate(498 290)">
    <use href="#hospital-base" width="180" height="112"/>
    <use href="#uncertainty-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Uncertainty/stale-observation layer</text>
  </g>

  <text x="42" y="480" class="ink small">Monochrome, small-size, fallback, pressure, and project variants remain text-labeled in the proof.</text>
</svg>
