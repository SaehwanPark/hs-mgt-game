<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" role="img" aria-labelledby="title desc">
  <title id="title">Patient tower facility component</title>
  <desc id="desc">Fixture source sheet for a reusable fictional patient tower with identity, capacity, project, pressure, selection, and uncertainty layers.</desc>
  <style>
    :root { --facility-primary: #315a89; --facility-secondary: #c2872f; --facility-ink: #17232d; --facility-paper: #f8fbfd; --facility-muted: #60707b; }
    .ink { fill: var(--facility-ink); font-family: system-ui, sans-serif; }
    .small { font-size: 13px; letter-spacing: .03em; }
    .title { font-size: 22px; font-weight: 700; }
    .label { font-size: 14px; font-weight: 700; }
  </style>
  <defs>
    <symbol id="patient-tower" viewBox="0 0 180 112">
      <rect x="18" y="70" width="144" height="32" rx="5" fill="var(--facility-primary)"/>
      <rect x="48" y="10" width="84" height="92" rx="5" fill="var(--facility-primary)"/>
      <path d="M62 26h14v15H62zm28 0h14v15H90zm-28 26h14v15H62zm28 0h14v15H90zm28-26h14v15h-14zm0 26h14v15h-14z" fill="var(--facility-paper)" opacity=".9"/>
      <path d="M42 70h96M36 102h108" stroke="var(--facility-secondary)" stroke-width="6"/>
      <path d="M90 2v16M80 10h20" stroke="var(--facility-secondary)" stroke-linecap="round" stroke-width="6"/>
      <rect x="78" y="78" width="24" height="24" fill="var(--facility-paper)"/>
      <path d="M90 83v14M83 90h14" stroke="var(--facility-secondary)" stroke-width="4"/>
    </symbol>
    <symbol id="identity-layer" viewBox="0 0 180 112">
      <rect x="52" y="14" width="34" height="24" rx="4" fill="var(--facility-paper)" stroke="var(--facility-secondary)" stroke-width="3"/>
      <text x="69" y="31" text-anchor="middle" class="ink" font-size="14" font-weight="800">ID</text>
    </symbol>
    <symbol id="capacity-layer" viewBox="0 0 180 112">
      <path d="M14 106h152" stroke="var(--facility-ink)" stroke-width="3"/>
      <path d="M18 106V84h24v22m8 0V62h24v44m8 0V40h24v66m8 0V18h24v88" fill="none" stroke="var(--facility-secondary)" stroke-width="6"/>
    </symbol>
    <symbol id="project-layer" viewBox="0 0 180 112">
      <path d="M14 102h152M22 102V42h8v60m128 0V42h8v60M26 42h132" fill="none" stroke="var(--facility-secondary)" stroke-width="4"/>
      <path d="M80 42 90 18l10 24z" fill="var(--facility-secondary)"/>
    </symbol>
    <symbol id="pressure-layer" viewBox="0 0 180 112">
      <path d="M150 8 174 48h-48z" fill="var(--facility-secondary)"/>
      <path d="M150 20v14m0 7v3" stroke="var(--facility-paper)" stroke-linecap="round" stroke-width="4"/>
    </symbol>
    <symbol id="selection-layer" viewBox="0 0 180 112">
      <rect x="4" y="4" width="172" height="104" rx="10" fill="none" stroke="var(--facility-secondary)" stroke-dasharray="8 5" stroke-width="5"/>
    </symbol>
    <symbol id="uncertainty-layer" viewBox="0 0 180 112">
      <path d="M10 98 170 14M-5 82 145 2M35 112 180 34" stroke="var(--facility-muted)" stroke-dasharray="5 6" stroke-width="10" opacity=".32"/>
    </symbol>
  </defs>

  <rect width="760" height="500" fill="var(--facility-paper)"/>
  <text x="32" y="38" class="ink title">Patient tower · fictional reusable component</text>
  <text x="32" y="61" class="ink small">Shared 8px grid; the vertical tower silhouette is a type cue, not a capacity claim.</text>

  <g id="patient-tower-base" transform="translate(42 92)">
    <use href="#patient-tower" width="180" height="112"/>
    <use href="#identity-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Tower + identity layer</text>
  </g>
  <g id="capacity-overlay" transform="translate(270 92)">
    <use href="#patient-tower" width="180" height="112"/>
    <use href="#capacity-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Capacity/service-line layer</text>
  </g>
  <g id="project-overlay" transform="translate(498 92)">
    <use href="#patient-tower" width="180" height="112"/>
    <use href="#project-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Project layer</text>
  </g>

  <g id="pressure-overlay" transform="translate(42 290)">
    <use href="#patient-tower" width="180" height="112"/>
    <use href="#pressure-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Operational-pressure layer</text>
  </g>
  <g id="selection-overlay" transform="translate(270 290)">
    <use href="#patient-tower" width="180" height="112"/>
    <use href="#selection-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Selection/focus layer</text>
  </g>
  <g id="uncertainty-overlay" transform="translate(498 290)">
    <use href="#patient-tower" width="180" height="112"/>
    <use href="#uncertainty-layer" width="180" height="112"/>
    <text x="0" y="143" class="ink label">Uncertainty/stale-observation layer</text>
  </g>

  <text x="42" y="480" class="ink small">Monochrome, small-size, fallback, pressure, and project variants remain text-labeled in the proof.</text>
</svg>
