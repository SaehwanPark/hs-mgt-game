name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check release metadata
        run: python3 scripts/check_release_metadata.py

      - name: Check documentation links
        run: python3 scripts/check_documentation_links.py

      - name: Check presentation asset registries
        run: |
          python3 scripts/validate_assets.py
          python3 scripts/validate_asset_security.py
          python3 scripts/sanitize_svg_metadata.py --check-release
          python3 scripts/verify_asset_release.py --check
          python3 scripts/generate_asset_credits.py --check
          python3 -m unittest tests.test_asset_registry tests.test_asset_security tests.test_asset_release tests.test_svg_metadata_sanitizer tests.test_visual_audio_roadmap tests.test_phase10_first_month tests.test_phase10_evaluation_prep tests.test_phase11_campaign_coverage tests.test_phase11_live_facility_binding tests.test_asset_fallback tests.test_audio_fallback tests.test_in_game_credits

      - name: Check generation provenance and portrait review gates
        run: |
          python3 scripts/validate_generation_metadata.py
          python3 -m unittest tests.test_generation_workflow tests.test_portrait_workflow tests.test_portrait_review_queue

      - name: Check formatting
        run: cargo fmt --check

      - name: Check lints
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test
